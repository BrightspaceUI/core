<!DOCTYPE html>
<html lang="en">

<head>

	<link rel="stylesheet" href="../../demo/styles.css" type="text/css">

</head>

<body unresolved>

	<d2l-demo-page page-title="d2l-dropdown-tabs">

							<d2l-tab id="first" text="First" slot="tabs"></d2l-tab>
							<d2l-tab-panel labelled-by="first" slot="panels">first content</d2l-tab-panel>
							<d2l-tab id="second" text="Second" slot="tabs"></d2l-tab>

					</d2l-dropdown-tabs>
				</d2l-dropdown>
			</template>
		</d2l-demo-snippet>

		<h2>Tabs (with nested menu)</h2>

		<d2l-demo-snippet>
			<template>
				<d2l-dropdown>
					<button class="d2l-dropdown-opener">Open it!</button>
					<d2l-dropdown-tabs min-width="175" max-width="300">
						<d2l-tabs text="Tabs">
							<d2l-tab id="first" text="First" slot="tabs"></d2l-tab>
							<d2l-tab-panel labelled-by="first" slot="panels">first content</d2l-tab-panel>
							<d2l-tab id="second" text="Second" slot="tabs"></d2l-tab>
							<d2l-tab-panel labelled-by="second" slot="panels">

							</d2l-tab-panel>
							<d2l-tab id="third" text="Third" slot="tabs"></d2l-tab>
							<d2l-tab-panel labelled-by="third" slot="panels">
								<d2l-menu label="Astronomy">
									<d2l-menu-item text="Introduction" id="first-item"></d2l-menu-item>
									<d2l-menu-item text="Searching for the Heavens "></d2l-menu-item>

								</d2l-menu>
							</d2l-tab-panel>
						</d2l-tabs>
					</d2l-dropdown-tabs>
				</d2l-dropdown>
